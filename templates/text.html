<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Text - SatyaShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-dots"></div>
    <div class="container">
        <nav class="glass-nav">
            <div class="logo">SatyaShield</div>
            <a href="/" class="nav-btn">Back to Home</a>
        </nav>

        <header>
            <h1>Verify Text / News</h1>
            <p class="subtitle">AI-powered fact verification powered by Gemini 2.0.</p>
        </header>

        <div class="single-feature-container" style="max-width: 800px; margin: 0 auto;">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-file-alt"></i>
                    Fact Checker
                </div>
                <div class="input-group">
                    <textarea id="newsInput" placeholder="Paste news or statement to verify..."></textarea>
                    <button onclick="detectNews(this)">
                        <span class="loader"></span>
                        Verify Fact
                    </button>
                </div>
                <div id="newsResult" class="result-area">Results will appear here...</div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 SatyaShield. Advanced Forensic Protection.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        async function detectNews(btn) {
            const news = document.getElementById('newsInput').value;
            if (!news) return alert('Please enter some text');
            apiCall('/detect-news', { news: news }, true, btn, 'newsResult');
        }
    </script>
</body>
</html>
