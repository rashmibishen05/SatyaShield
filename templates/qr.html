<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure QR - SatyaShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-dots"></div>
    <div class="container">
        <nav class="glass-nav">
            <div class="logo">SatyaShield</div>
            <a href="/" class="nav-btn">Back to Home</a>
        </nav>

        <header>
            <h1>Secure QR Scanner</h1>
            <p class="subtitle">Safely decode and analyze QR code payloads.</p>
        </header>

        <div class="single-feature-container" style="max-width: 800px; margin: 0 auto;">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-qrcode"></i>
                    QR Analyzer
                </div>
                <div class="input-group">
                    <label for="qrFile" class="file-label">
                        <i class="fas fa-qrcode"></i>
                        <span id="qrFileName">Upload QR Code</span>
                    </label>
                    <input type="file" id="qrFile" accept="image/*" style="display:none" onchange="updateFileName(this, 'qrFileName')">
                    <button onclick="detectQR(this)">
                        <span class="loader"></span>
                        Read QR
                    </button>
                </div>
                <div id="qrResult" class="result-area">Results will appear here...</div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 SatyaShield. Advanced Forensic Protection.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        function updateFileName(input, targetId) {
            const fileName = input.files[0] ? input.files[0].name : 'Choose File';
            document.getElementById(targetId).textContent = fileName;
        }

        async function detectQR(btn) {
            const fileInput = document.getElementById('qrFile');
            if (!fileInput.files[0]) return alert('Please select a QR code image');
            const formData = new FormData();
            formData.append('qr', fileInput.files[0]);
            apiCall('/detect-qr', formData, false, btn, 'qrResult');
        }
    </script>
</body>
</html>
