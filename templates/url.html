<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check URL - SatyaShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-dots"></div>
    <div class="container">
        <nav class="glass-nav">
            <div class="logo">SatyaShield</div>
            <a href="/" class="nav-btn">Back to Home</a>
        </nav>

        <header>
            <h1>Check URL</h1>
            <p class="subtitle">Phishing and malicious domain detection.</p>
        </header>

        <div class="single-feature-container" style="max-width: 800px; margin: 0 auto;">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-link"></i>
                    URL Scanner
                </div>
                <div class="input-group">
                    <input type="text" id="urlInput" placeholder="https://example.com">
                    <button onclick="detectURL(this)">
                        <span class="loader"></span>
                        Scan Link
                    </button>
                </div>
                <div id="urlResult" class="result-area">Results will appear here...</div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 SatyaShield. Advanced Forensic Protection.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        async function detectURL(btn) {
            const url = document.getElementById('urlInput').value;
            if (!url) return alert('Please enter a URL');
            apiCall('/detect-url', { url: url }, true, btn, 'urlResult');
        }
    </script>
</body>
</html>
