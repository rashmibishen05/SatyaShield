<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Authenticity - SatyaShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-dots"></div>
    <div class="container">
        <nav class="glass-nav">
            <div class="logo">SatyaShield</div>
            <a href="/" class="nav-btn">Back to Home</a>
        </nav>

        <header>
            <h1>Video Forensic Verification</h1>
            <p class="subtitle">Analyze video metadata and frames for manipulations.</p>
        </header>

        <div class="single-feature-container" style="max-width: 800px; margin: 0 auto;">
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-video"></i>
                    Video Detector
                </div>
                <div class="input-group">
                    <label for="videoFile" class="file-label">
                        <i class="fas fa-film"></i>
                        <span id="videoFileName">Choose Video</span>
                    </label>
                    <input type="file" id="videoFile" accept="video/*" style="display:none" onchange="updateFileName(this, 'videoFileName')">
                    <button onclick="detectVideo(this)">
                        <span class="loader"></span>
                        Verify Video
                    </button>
                </div>
                <div id="videoResult" class="result-area">Results will appear here...</div>
            </div>
        </div>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 SatyaShield. Advanced Forensic Protection.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        function updateFileName(input, targetId) {
            const fileName = input.files[0] ? input.files[0].name : 'Choose File';
            document.getElementById(targetId).textContent = fileName;
        }

        async function detectVideo(btn) {
            const fileInput = document.getElementById('videoFile');
            if (!fileInput.files[0]) return alert('Please select a video');
            const formData = new FormData();
            formData.append('video', fileInput.files[0]);
            apiCall('/detect-video', formData, false, btn, 'videoResult');
        }
    </script>
</body>
</html>
